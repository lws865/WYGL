<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设置页面字符编码为UTF-8，确保中文正常显示 -->
    <meta charset="UTF-8">
    <!-- 配置视口，支持移动端响应式布局 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 页面标题 -->
    <title>基础数据 - 汇泰物业管理系统</title>
    <!-- 引入全局样式文件 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 应用主容器 -->
    <div class="app-container">
        <!-- 主内容容器 -->
        <div class="main-container">
            <!-- 导航栏区域 -->
            <nav class="navbar">
                <!-- 导航栏左侧 -->
                <div class="navbar-left">
                    <!-- 系统标题 -->
                    <h1 class="nav-title">汇泰物业管理系统</h1>
                    <!-- 导航标签页 -->
                    <div class="nav-tabs">
                        <!-- 首页链接 -->
                        <a href="index.html" class="nav-tab">首页</a>
                        <!-- 基础数据页面链接，当前激活状态 -->
                        <a href="basic-data.html" class="nav-tab active">基础数据</a>
                        <!-- 楼房数据页面链接 -->
                        <a href="building-data.html" class="nav-tab">楼房数据</a>
                        <!-- 住户数据页面链接 -->
                        <a href="resident-data.html" class="nav-tab">住户数据</a>
                        <!-- 统计中心页面链接 -->
                        <a href="statistics-center.html" class="nav-tab">统计中心</a>
                    </div>
                </div>
                <!-- 导航栏右侧 -->
                <div class="navbar-right">
                    <!-- 搜索框 -->
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="search-input" placeholder="搜索...">
                    </div>
                    <!-- 用户资料区域 -->
                    <div class="user-profile">
                        <!-- 用户头像 -->
                        <div class="user-avatar">管</div>
                        <!-- 用户信息 -->
                        <div class="user-info">
                            <div class="user-name">管理员</div>
                            <div class="user-role">系统管理员</div>
                        </div>
                    </div>
                    <!-- 退出按钮 -->
                    <button class="btn btn-secondary" onclick="logout()">退出</button>
                </div>
            </nav>

            <!-- 页面内容区域 -->
            <div class="page-content">
                <!-- 主卡片容器 -->
                <div class="card">
                    <!-- 卡片头部 -->
                    <div class="card-header">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div>
                                <!-- 卡片标题 -->
                                <h3 class="card-title">费用管理</h3>
                                <!-- 卡片副标题 -->
                                <p class="card-subtitle">管理各类费用标准和基础数据</p>
                            </div>
                        </div>
                    </div>

                    <!-- 区域分组容器 -->
                    <div class="section-group">
                        <!-- 物业楼层基础费区域 -->
                        <div class="section-item property-fee-section">
                            <!-- 区域头部 -->
                            <div class="section-header">
                                <!-- 区域标题 -->
                                <span class="section-title">1. 物业楼层基础费</span>
                                <!-- 区域操作按钮 -->
                                <div class="section-actions">
                                    <button class="btn btn-primary btn-sm" onclick="openFeeModal('property')">+ 添加</button>
                                </div>
                            </div>
                            <!-- 区域内容 -->
                            <div class="section-content">
                                <!-- 表格头部 -->
                                <div class="table-header">
                                    <div class="table-cell">ID</div>
                                    <div class="table-cell">描述</div>
                                    <div class="table-cell">金额 (元)</div>
                                    <div class="table-cell">操作</div>
                                </div>
                                <!-- 表格内容容器 -->
                                <div id="propertyTableBody" class="table-container"></div>
                            </div>
                        </div>

                        <!-- 卫生费区域 -->
                        <div class="section-item">
                            <div class="section-header">
                                <span class="section-title">2. 卫生费</span>
                                <div class="section-actions">
                                    <button class="btn btn-primary btn-sm" onclick="openFeeModal('sanitation')">+ 添加</button>
                                </div>
                            </div>
                            <div class="section-content">
                                <div class="table-header">
                                    <div class="table-cell">ID</div>
                                    <div class="table-cell">描述</div>
                                    <div class="table-cell">金额 (元)</div>
                                    <div class="table-cell">操作</div>
                                </div>
                                <div id="sanitationTableBody" class="table-container"></div>
                            </div>
                        </div>

                        <!-- 汽车停车费区域 -->
                        <div class="section-item">
                            <div class="section-header">
                                <span class="section-title">3. 汽车停车费</span>
                                <div class="section-actions">
                                    <button class="btn btn-primary btn-sm" onclick="openFeeModal('car')">+ 添加</button>
                                </div>
                            </div>
                            <div class="section-content">
                                <div class="table-header">
                                    <div class="table-cell">ID</div>
                                    <div class="table-cell">描述</div>
                                    <div class="table-cell">金额 (元)</div>
                                    <div class="table-cell">操作</div>
                                </div>
                                <div id="carTableBody" class="table-container"></div>
                            </div>
                        </div>

                        <!-- 摩托车停车费区域 -->
                        <div class="section-item">
                            <div class="section-header">
                                <span class="section-title">4. 摩托车停车费</span>
                                <div class="section-actions">
                                    <button class="btn btn-primary btn-sm" onclick="openFeeModal('motorcycle')">+ 添加</button>
                                </div>
                            </div>
                            <div class="section-content">
                                <div class="table-header">
                                    <div class="table-cell">ID</div>
                                    <div class="table-cell">描述</div>
                                    <div class="table-cell">金额 (元)</div>
                                    <div class="table-cell">操作</div>
                                </div>
                                <div id="motorcycleTableBody" class="table-container"></div>
                            </div>
                        </div>

                        <!-- 物业管理费项目区域 -->
                        <div class="section-item">
                            <div class="section-header">
                                <span class="section-title">5. 物业管理费项目</span>
                                <div class="section-actions">
                                    <button class="btn btn-primary btn-sm" onclick="openPropertyManagementItemModal()">+ 添加</button>
                                </div>
                            </div>
                            <div class="section-content">
                                <div class="table-header">
                                    <div class="table-cell" style="flex:0.5">ID</div>
                                    <div class="table-cell" style="flex:3">描述</div>
                                    <div class="table-cell" style="flex:0.5">操作</div>
                                </div>
                                <div id="propertyManagementItemsTableBody" class="table-container"></div>
                            </div>
                        </div>

                        <!-- 电梯管理费项目区域 -->
                        <div class="section-item">
                            <div class="section-header">
                                <span class="section-title">6. 电梯管理费项目</span>
                                <div class="section-actions">
                                    <button class="btn btn-primary btn-sm" onclick="openElevatorManagementItemModal()">+ 添加</button>
                                </div>
                            </div>
                            <div class="section-content">
                                <div class="table-header">
                                    <div class="table-cell" style="flex:0.5">ID</div>
                                    <div class="table-cell" style="flex:2">描述</div>
                                    <div class="table-cell" style="flex:1">金额 (元)</div>
                                    <div class="table-cell" style="flex:0.5">操作</div>
                                </div>
                                <div id="elevatorManagementItemsTableBody" class="table-container"></div>
                            </div>
                        </div>

                        <!-- 其他费用区域 -->
                        <div class="section-item">
                            <div class="section-header">
                                <span class="section-title">7. 其他费用</span>
                                <div class="section-actions">
                                    <button class="btn btn-primary btn-sm" onclick="openFeeModal('other')">+ 添加</button>
                                </div>
                            </div>
                            <div class="section-content">
                                <div class="table-header">
                                    <div class="table-cell">ID</div>
                                    <div class="table-cell">描述</div>
                                    <div class="table-cell">金额 (元)</div>
                                    <div class="table-cell">操作</div>
                                </div>
                                <div id="otherTableBody" class="table-container"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 弹窗样式 -->
    <style>
        /* 所有添加和编辑页面统一设计 - 与登录页面风格一致 */
        #feeModal .modal-content {
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            background-color: white;
        }
        
        #feeModal .modal-header {
            padding: 24px 32px;
            border: none;
            text-align: center;
            background-color: white;
        }
        
        #feeModal .modal-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        #feeModal .modal-title {
            font-size: 16px;
            margin: 0;
            color: #1E293B;
        }
        
        #feeModal .modal-body {
            padding: 0 32px 32px 32px;
        }
        
        #feeModal .form-group {
            margin-bottom: 16px;
        }
        
        #feeModal .form-group label {
            display: block;
            font-size: 12px;
            color: #64748B;
            margin-bottom: 4px;
        }
        
        #feeModal .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            font-size: 13px;
            box-sizing: border-box;
        }
        
        #feeModal .form-group input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        #feeModal .modal-footer {
            padding: 0 32px 24px 32px;
            display: flex;
            gap: 12px;
        }
        
        #feeModal .modal-footer button {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        #feeModal .btn-cancel {
            background: #F1F5F9;
            color: #64748B;
            border: none;
        }
        
        #feeModal .btn-cancel:hover {
            background: #E2E8F0;
        }
        
        #feeModal .btn-confirm {
            background: #3B82F6;
            color: white;
            border: none;
        }
        
        #feeModal .btn-confirm:hover {
            background: #2563EB;
        }
    </style>

    <!-- 弹窗HTML结构 -->
    <div id="feeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-icon">💰</div>
                <h3 class="modal-title" id="modalTitle">添加费用</h3>
            </div>
            <div class="modal-body">
                <input type="hidden" id="feeId">
                <div class="form-group">
                    <label for="feeDescription">描述</label>
                    <input type="text" id="feeDescription" placeholder="请输入费用描述">
                </div>
                <div class="form-group">
                    <label for="feeAmount">金额 (元)</label>
                    <input type="number" id="feeAmount" placeholder="请输入金额" step="0.01" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" onclick="saveFee()">保存</button>
            </div>
        </div>
    </div>

    <!-- 物业管理费项目弹窗 -->
    <div id="propertyManagementItemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-icon">🏢</div>
                <h3 class="modal-title" id="propertyManagementItemModalTitle">添加物业管理费项目</h3>
            </div>
            <div class="modal-body">
                <input type="hidden" id="propertyManagementItemId">
                <div class="form-group">
                    <label for="propertyManagementItemDescription">描述</label>
                    <input type="text" id="propertyManagementItemDescription" placeholder="请输入项目描述">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" onclick="savePropertyManagementItem()">保存</button>
            </div>
        </div>
    </div>

    <!-- 电梯管理费项目弹窗 -->
    <div id="elevatorManagementItemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-icon">🛗</div>
                <h3 class="modal-title" id="elevatorManagementItemModalTitle">添加电梯管理费项目</h3>
            </div>
            <div class="modal-body">
                <input type="hidden" id="elevatorManagementItemId">
                <div class="form-group">
                    <label for="elevatorManagementItemDescription">描述</label>
                    <input type="text" id="elevatorManagementItemDescription" placeholder="请输入项目描述">
                </div>
                <div class="form-group">
                    <label for="elevatorManagementItemAmount">金额 (元)</label>
                    <input type="number" id="elevatorManagementItemAmount" placeholder="请输入金额" step="0.01" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" onclick="saveElevatorManagementItem()">保存</button>
            </div>
        </div>
    </div>

    <!-- 引入API接口文件 -->
    <script src="js/api.js"></script>
    <!-- 引入基础数据页面业务逻辑文件 -->
    <script src="js/basic-data.js"></script>
</body>
</html>
