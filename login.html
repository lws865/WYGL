<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汇泰物业管理系统 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 32px;
            border-radius: 8px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-header .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
        .login-header h2 {
            font-size: 18px;
            color: #1E293B;
            margin: 0;
        }
        .login-header p {
            font-size: 12px;
            color: #64748B;
            margin: 4px 0 0 0;
        }
        .login-form .form-group {
            margin-bottom: 16px;
        }
        .login-form input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s;
        }
        .login-form input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .login-form button {
            width: 100%;
            padding: 10px;
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-form button:hover {
            background: #2563EB;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <div class="icon">🏢</div>
            <h2>汇泰物业管理系统</h2>
            <p>高效管理，贴心服务</p>
        </div>
        <form class="login-form">
            <div class="form-group">
                <input type="text" id="username" placeholder="请输入用户名" value="admin">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="请输入密码" value="aa888888">
            </div>
            <button type="button" onclick="handleLogin()">登录</button>
        </form>
    </div>
    <script>
        const API_BASE_URL = 'http://localhost:3001/api';

        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    alert(data.message || '用户名或密码错误');
                }
            } catch (error) {
                console.error('登录失败:', error);
                alert('登录失败，请检查服务器是否启动');
            }
        }
    </script>
</body>
</html>
